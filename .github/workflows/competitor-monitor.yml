name: Klook Competitor Monitor

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run competitor report
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          LARK_WEBHOOK_URL:   ${{ secrets.LARK_WEBHOOK_URL }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
          SHEETS_WEBAPP_URL:  ${{ secrets.SHEETS_WEBAPP_URL }}
        run: node scraper.js

      - name: Commit updated data.json
        run: |
          git config --global user.name "Competitor Monitor Bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add website/data.json
          git commit -m "Update competitor data — $(date -u +'%Y-%m-%d')" || echo "No changes"
          git push
